name: trading-cycle

on:
  schedule:
    - cron: "45 3 * * 1-5"   # 09:15 IST
    - cron: "45 5 * * 1-5"   # 11:15 IST
    - cron: "45 7 * * 1-5"   # 13:15 IST
    - cron: "45 9 * * 1-5"   # 15:15 IST
  workflow_dispatch:

concurrency:
  group: trading-cycle
  cancel-in-progress: false

jobs:
  run-trading-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONUNBUFFERED: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
      ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
      ANGEL_PASSWORD: ${{ secrets.ANGEL_PASSWORD }}
      ANGEL_TOTP: ${{ secrets.ANGEL_TOTP }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore trading state
        uses: actions/cache/restore@v4
        with:
          path: |
            current_portfolio.csv
            logs/last_processed_slot.txt
            logs/dashboard_metrics.json
            logs/state_backups
            data/live/2h
          key: trading-state-${{ github.run_id }}
          restore-keys: |
            trading-state-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m compileall paper_trading

      - name: Health check
        run: |
          python -m paper_trading.health_check

      - name: Incremental 2H data update
        run: |
          python -m paper_trading.update_nifty500_data

      - name: Validate 2H data
        run: |
          python -m paper_trading.data_validator

      - name: Run scheduler once
        run: |
          python -m paper_trading.market_scheduler --once --allow-late-minutes 30

      - name: Save trading state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            current_portfolio.csv
            logs/last_processed_slot.txt
            logs/dashboard_metrics.json
            logs/state_backups
            data/live/2h
          key: trading-state-${{ github.run_id }}

      - name: Publish logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-cycle-logs-${{ github.run_id }}
          path: |
            logs/system.log
            logs/data_update_log.csv
            logs/data_validation_report.csv
            logs/data_validation_report.json
            logs/dashboard_metrics.json
            logs/last_processed_slot.txt
